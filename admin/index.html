<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlueVision Admin</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .admin-panel {
      padding: 40px;
      background: var(--bg-card);
      border-radius: 20px;
      margin: 40px auto;
      max-width: 1200px;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    .stock-editor {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .stock-item {
      background: rgba(30, 41, 59, 0.6);
      padding: 20px;
      border-radius: 15px;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }
    .stock-item input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      background: #1e293b;
      border: 1px solid #3b82f6;
      border-radius: 8px;
      color: white;
    }
    .admin-btn {
      background: var(--primary);
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      margin: 5px;
    }
    .logout-btn {
      background: var(--danger);
    }
  </style>
</head>
<body>
  <canvas id="networkCanvas"></canvas>
  <div class="bg-overlay"></div>

  <div class="container">
    <div class="admin-panel">
      <div class="admin-header">
        <h1><i class="fas fa-lock"></i> BlueVision Admin Panel</h1>
        <button class="admin-btn logout-btn" onclick="logout()">Logout</button>
      </div>

      <div id="adminContent">
        <!-- Dynamic content loaded via JS -->
      </div>

      <div style="margin-top: 30px;">
        <button class="admin-btn" onclick="saveAllChanges()">Save All Changes</button>
        <button class="admin-btn" onclick="exportData()">Export Data</button>
        <button class="admin-btn logout-btn" onclick="resetToDefault()">Reset to Default</button>
      </div>
    </div>
  </div>

  <script>
    // Check admin access
    if (sessionStorage.getItem('bluevision_admin') !== 'true') {
      window.location.href = '/BlueVision/';
    }

    function logout() {
      sessionStorage.removeItem('bluevision_admin');
      window.location.href = '/BlueVision/';
    }

    function saveAllChanges() {
      const inputs = document.querySelectorAll('.stock-input');
      const newData = { spoofer: {}, discord: [], roblox: [], fortnite: [], premium: [] };
      
      // Collect data
      inputs.forEach(input => {
        const [category, index, field] = input.name.split('-');
        if (category === 'spoofer') {
          newData.spoofer[field] = parseInt(input.value);
        }
      });
      
      if (window.parent.BlueVisionAdmin) {
        window.parent.BlueVisionAdmin.updateStock(newData);
      }
      
      alert('Changes saved! Refresh the main page to see updates.');
    }

    function exportData() {
      const data = localStorage.getItem('bluevision_stock');
      const blob = new Blob([data], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'bluevision_stock_backup.json';
      a.click();
    }

    function resetToDefault() {
      if (confirm('Reset all stock to default values?')) {
        localStorage.removeItem('bluevision_stock');
        alert('Reset complete. Refresh the page.');
        location.reload();
      }
    }

    // Load stock data
    const stockData = JSON.parse(localStorage.getItem('bluevision_stock')) || {
      spoofer: { permanent: 156, temp: 234 }
    };

    document.getElementById('adminContent').innerHTML = `
      <h2>Spoofer Stock</h2>
      <div class="stock-editor">
        <div class="stock-item">
          <label>Permanent Spoofer Keys</label>
          <input type="number" class="stock-input" name="spoofer-0-permanent" value="${stockData.spoofer.permanent}">
        </div>
        <div class="stock-item">
          <label>Temporary Spoofer Keys</label>
          <input type="number" class="stock-input" name="spoofer-0-temp" value="${stockData.spoofer.temp}">
        </div>
      </div>
      
      <h2 style="margin-top: 30px;">Discord Stock</h2>
      <div class="stock-editor" id="discordEditor"></div>
      
      <h2 style="margin-top: 30px;">Roblox Stock</h2>
      <div class="stock-editor" id="robloxEditor"></div>
    `;

    // Populate editors
    if (stockData.discord) {
      const discordEditor = document.getElementById('discordEditor');
      discordEditor.innerHTML = stockData.discord.map((item, i) => `
        <div class="stock-item">
          <label>${item.name}</label>
          <input type="number" class="stock-input" name="discord-${i}-stock" value="${item.stock}">
        </div>
      `).join('');
    }
  </script>

  <script src="../script.js"></script>
</body>
</html>
