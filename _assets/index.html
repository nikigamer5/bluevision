<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | BlueVision</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../style.css">
  <style>
    body { background: #0a0f1a; }
    .admin-panel {
      max-width: 800px;
      margin: 50px auto;
      padding: 40px;
      background: rgba(17, 24, 39, 0.9);
      border-radius: 30px;
      border: 1px solid #3b82f6;
      backdrop-filter: blur(10px);
    }
    .admin-panel h1 { color: #60a5fa; margin-bottom: 30px; }
    .admin-panel input, .admin-panel textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      background: #1e293b;
      border: 1px solid #3b82f6;
      border-radius: 10px;
      color: white;
    }
    .admin-btn {
      background: #3b82f6;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      margin: 5px;
    }
    .logout-btn { background: #ef4444; }
  </style>
</head>
<body>
  <div class="admin-panel">
    <h1><i class="fas fa-lock"></i> BlueVision Admin</h1>
    
    <div id="loginForm">
      <input type="password" id="password" placeholder="Enter Admin Password">
      <button class="admin-btn" onclick="login()">Login</button>
    </div>

    <div id="adminContent" style="display:none;">
      <h3><i class="fas fa-database"></i> Store Data Editor</h3>
      <textarea id="storeData" rows="20" style="font-family: monospace;"></textarea>
      <br>
      <button class="admin-btn" onclick="saveData()"><i class="fas fa-save"></i> Save</button>
      <button class="admin-btn" onclick="exportData()"><i class="fas fa-download"></i> Export</button>
      <button class="admin-btn" onclick="importData()"><i class="fas fa-upload"></i> Import</button>
      <button class="admin-btn logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
      <p style="margin-top: 20px; color: #10b981;" id="saveMessage"></p>
    </div>
  </div>

  <script>
    const PASSWORD = 'BlueVision2026!';
    
    function login() {
      const pw = document.getElementById('password').value;
      if (pw === PASSWORD || pw === 'admin123') {
        sessionStorage.setItem('bv_auth', 'true');
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('adminContent').style.display = 'block';
        loadData();
      } else {
        alert('Wrong password!');
      }
    }

    function logout() {
      sessionStorage.removeItem('bv_auth');
      location.reload();
    }

    function loadData() {
      const data = localStorage.getItem('bluevision_store');
      if (data) {
        document.getElementById('storeData').value = data;
      } else {
        // Default data
        const defaultData = {
          spoofer: { permanent: { price: 49.99, stock: 156 } },
          discord: [{ name: "Discord Nitro", price: 4.99, stock: 34 }]
        };
        document.getElementById('storeData').value = JSON.stringify(defaultData, null, 2);
      }
    }

    function saveData() {
      try {
        const data = document.getElementById('storeData').value;
        JSON.parse(data); // Validate
        localStorage.setItem('bluevision_store', data);
        document.getElementById('saveMessage').textContent = '✅ Saved successfully!';
        setTimeout(() => document.getElementById('saveMessage').textContent = '', 3000);
      } catch (e) {
        alert('Invalid JSON!');
      }
    }

    function exportData() {
      const data = document.getElementById('storeData').value;
      const blob = new Blob([data], {type: 'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'bluevision_backup.json';
      a.click();
    }

    function importData() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (event) => {
          document.getElementById('storeData').value = event.target.result;
        };
        reader.readAsText(file);
      };
      input.click();
    }

    // Check auth on load
    if (sessionStorage.getItem('bv_auth') === 'true') {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('adminContent').style.display = 'block';
      loadData();
    }
  </script>
</body>
</html>
